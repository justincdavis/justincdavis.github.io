<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Justin Davis</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Redirects /publications, /projects, etc. back to index.html
    // while preserving the path in a query string
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
    );
  </script>
</head>
<body>Redirecting...</body>
</html>
