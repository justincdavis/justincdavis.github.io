<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Justin Davis — PhD Student, HPSS Lab @ Mines</title>
    <meta name="description" content="Justin Davis — PhD student in computer science at Colorado School of Mines, researching efficient machine learning, edge computing, and heterogeneous systems." />
    <!-- GitHub Pages SPA routing: restore path from redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Handle ?p= from 404.html redirect
        var search = window.location.search;
        if (search.indexOf('?p=') !== -1) {
          var path = decodeURIComponent(search.slice(3).split('&h=')[0]);
          var hash = search.indexOf('&h=') !== -1 ? '#' + decodeURIComponent(search.split('&h=')[1]) : '';
          history.replaceState(null, null, path + hash);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  </head>
